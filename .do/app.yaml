        value: "0x47ea5710ea674f5D653A59c96836E2d20288813a"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_GROW_MINTER
        value: "0x3D44d8c9D078f3aD92CacE67C09DdE9e8172A98B"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_GROW_FEE_SPLITTER
        value: "0x18b1E79F7b7a802f75e7F2261a9f7f2Bfbcd831f"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_GROW_STAKING_POOL
        value: "0xD4f6c69457F34332D3cd9ea287F69a91e84a803A"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_SUBGRAPH_URL
        value: https://ugraph.growfi.dev/subgraphs/growfi/latest/gn
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_ENABLE_SOCIAL_VERIFICATION
        value: "false"
        scope: BUILD_TIME
      # Same-origin — the /api prefix is routed to the backend service.
      - key: NEXT_PUBLIC_BACKEND_URL
        value: ""
        scope: BUILD_TIME
      # Not actually secret — reown's project ID is a rate-limit key, safe
      # to commit (and already in the local .env.local of every dev).
      - key: NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID
        value: f63b9a7d56918f3d22562760af474053
        scope: BUILD_TIME
