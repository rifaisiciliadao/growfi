# DigitalOcean App Platform spec for the GrowFi platform.
#
# Architecture: single public HTTPS endpoint (growfi-test.ondigitalocean.app
# initially, custom domain later) with path-based routing:
#   /           -> Next.js frontend
#   /api/*      -> Fastify backend
# Both are Docker-built from the monorepo; pushes to `main` auto-deploy.
#
# Create/update via:
#   doctl apps create --spec .do/app.yaml          # first time
#   doctl apps update <APP_ID> --spec .do/app.yaml # on spec changes
# Secrets (DO_SPACES_KEY / DO_SPACES_SECRET) are set in the dashboard and
# are NOT in this file; this spec only ships non-secret defaults.

name: growfi-test
region: fra

# Path-based ingress: one domain, two services behind it.
ingress:
  rules:
    - match:
        path:
          prefix: /api
      component:
        name: growfi-backend
        # Backend routes are defined with the `/api/...` prefix (e.g.
        # `app.post("/api/upload", ...)`); without preserving the prefix
        # the ingress strips `/api` and every route 404s.
        preserve_path_prefix: true
    - match:
        path:
          prefix: /
      component:
        name: growfi-frontend

services:
  # -----------------------------------------------------------------------
  # Backend: Fastify — DO Spaces uploads + snapshot + merkle generation.
  # -----------------------------------------------------------------------
  - name: growfi-backend
    dockerfile_path: platform/backend/Dockerfile
    source_dir: platform/backend
    github:
      repo: rifaisiciliadao/growfi
      branch: main
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 4001
    health_check:
      http_path: /health
      initial_delay_seconds: 15
      period_seconds: 30
      timeout_seconds: 5
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
      - key: PORT
        value: "4001"
        scope: RUN_TIME
      - key: HOST
        value: 0.0.0.0
        scope: RUN_TIME
      - key: DO_SPACES_REGION
        value: fra1
        scope: RUN_TIME
      - key: DO_SPACES_BUCKET
        value: growfi-media
        scope: RUN_TIME
      - key: DO_SPACES_ENDPOINT
        value: https://fra1.digitaloceanspaces.com
        scope: RUN_TIME
      - key: DO_SPACES_PUBLIC_BASE
        value: https://growfi-media.fra1.digitaloceanspaces.com
        scope: RUN_TIME
      # --- Invite gate (per-eth JSON on growfi-media, Resend mail) ---
      - key: INVITES_OBJECT_PREFIX
        value: invites
        scope: RUN_TIME
      - key: APP_URL
        value: https://growfi-test-m9s8u.ondigitalocean.app
        scope: RUN_TIME
      - key: ADMIN_NOTIFY_EMAIL
        value: hey@growfi.dev
        scope: RUN_TIME
      - key: RESEND_FROM
        value: GrowFi <hello@notifications.growfi.dev>
        scope: RUN_TIME
      - key: INVITE_RATE_WINDOW_MS
        value: "3600000"
        scope: RUN_TIME
      - key: INVITE_RATE_MAX
        value: "5"
        scope: RUN_TIME
      # Secrets (set via dashboard, not committed here):
      #   DO_SPACES_KEY     (SECRET, RUN_TIME)
      #   DO_SPACES_SECRET  (SECRET, RUN_TIME)
      #   ADMIN_API_KEY     (SECRET, RUN_TIME)  — shared with the local admin dashboard
      #   RESEND_API_KEY    (SECRET, RUN_TIME)
      #   BASE_SEPOLIA_RPC  (optional override for the snapshot multicall)
      #   SUBGRAPH_URL      (optional; defaults to growfi/prod in code)

  # -----------------------------------------------------------------------
  # Frontend: Next.js 16 standalone. All NEXT_PUBLIC_* are build-time,
  # baked into the bundle — no way to change them without a rebuild.
  # -----------------------------------------------------------------------
  - name: growfi-frontend
    dockerfile_path: platform/frontend/Dockerfile
    source_dir: platform/frontend
    github:
      repo: rifaisiciliadao/growfi
      branch: main
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 3000
    health_check:
      http_path: /
      initial_delay_seconds: 20
      period_seconds: 30
      timeout_seconds: 5
      failure_threshold: 3
    envs:
      - key: NEXT_PUBLIC_CHAIN_ID
        value: "84532"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_FACTORY_ADDRESS
        value: "0xD5C6705c291743BBd9b30B08680360f96801579D"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_USDC_ADDRESS
        value: "0x4E53CF93D2927D225668EE570Dc3fA8b55917130"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_REGISTRY_ADDRESS
        value: "0xbe1ce60CE358a70603a494dcb271A505D3C1f988"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_PRODUCER_REGISTRY_ADDRESS
        value: "0x9b41c56Cddb0d9DC6c97d8d4c5246e6d4caC329e"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_SUBGRAPH_URL
        value: https://api.goldsky.com/api/public/project_cmo1ydnmbj6tv01uwahhbeenr/subgraphs/growfi/prod/gn
        scope: BUILD_TIME
      # Same-origin — the /api prefix is routed to the backend service.
      - key: NEXT_PUBLIC_BACKEND_URL
        value: ""
        scope: BUILD_TIME
      # Not actually secret — reown's project ID is a rate-limit key, safe
      # to commit (and already in the local .env.local of every dev).
      - key: NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID
        value: f63b9a7d56918f3d22562760af474053
        scope: BUILD_TIME
