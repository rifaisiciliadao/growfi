# DigitalOcean App Platform spec for the GrowFi platform.
#
# Architecture: single public HTTPS endpoint (growfi-test.ondigitalocean.app
# initially, custom domain later) with path-based routing:
#   /           -> Next.js frontend
#   /api/*      -> Fastify backend
# Both are Docker-built from the monorepo; pushes to `main` auto-deploy.
#
# Create/update via:
#   doctl apps create --spec .do/app.yaml          # first time
#   doctl apps update <APP_ID> --spec .do/app.yaml # on spec changes
# Secrets (DO_SPACES_KEY / DO_SPACES_SECRET) are set in the dashboard and
# are NOT in this file; this spec only ships non-secret defaults.

name: growfi-test
region: fra

# Path-based ingress: one domain, two services behind it.
ingress:
  rules:
    - match:
        path:
          prefix: /api
      component:
        name: growfi-backend
        # Backend routes are defined with the `/api/...` prefix (e.g.
        # `app.post("/api/upload", ...)`); without preserving the prefix
        # the ingress strips `/api` and every route 404s.
        preserve_path_prefix: true
    - match:
        path:
          prefix: /
      component:
        name: growfi-frontend

services:
  # -----------------------------------------------------------------------
  # Backend: Fastify — DO Spaces uploads + snapshot + merkle generation.
  # -----------------------------------------------------------------------
  - name: growfi-backend
    dockerfile_path: platform/backend/Dockerfile
    source_dir: platform/backend
    github:
      repo: rifaisiciliadao/growfi
      branch: main
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 4001
    health_check:
      http_path: /health
      initial_delay_seconds: 15
      period_seconds: 30
      timeout_seconds: 5
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
      - key: PORT
        value: "4001"
        scope: RUN_TIME
      - key: HOST
        value: 0.0.0.0
        scope: RUN_TIME
      - key: DO_SPACES_REGION
        value: fra1
        scope: RUN_TIME
      - key: DO_SPACES_BUCKET
        value: growfi-media
        scope: RUN_TIME
      - key: DO_SPACES_ENDPOINT
        value: https://fra1.digitaloceanspaces.com
        scope: RUN_TIME
      - key: DO_SPACES_PUBLIC_BASE
        value: https://growfi-media.fra1.digitaloceanspaces.com
        scope: RUN_TIME
      # --- Invite gate (per-eth JSON on growfi-media, Resend mail) ---
      - key: INVITES_OBJECT_PREFIX
        value: invites
        scope: RUN_TIME
      - key: APP_URL
        value: https://growfi-test-m9s8u.ondigitalocean.app
        scope: RUN_TIME
      - key: ADMIN_NOTIFY_EMAIL
        value: hey@growfi.dev
        scope: RUN_TIME
      - key: RESEND_FROM
        value: GrowFi <hello@notifications.growfi.dev>
        scope: RUN_TIME
      - key: INVITE_RATE_WINDOW_MS
        value: "3600000"
        scope: RUN_TIME
      - key: INVITE_RATE_MAX
        value: "5"
        scope: RUN_TIME
      - key: NOTIFIER_INTERVAL_MS
        value: "600000"
        scope: RUN_TIME
      # Secrets (set via dashboard / `doctl apps update --spec ...`, not committed here):
      #   DO_SPACES_KEY                (SECRET, RUN_TIME)
      #   DO_SPACES_SECRET             (SECRET, RUN_TIME)
      #   ADMIN_API_KEY                (SECRET, RUN_TIME)  — shared with the local admin dashboard
      #   RESEND_API_KEY               (SECRET, RUN_TIME)
      #   NOTIFICATIONS_UNSUB_SECRET   (SECRET, RUN_TIME)  — HMAC key for digest unsubscribe links; rotate to invalidate all live links
      #   SEPOLIA_RPC_URL              (optional override for the snapshot multicall)
      #   SUBGRAPH_URL                 (optional; defaults to ugraph latest in code)
      #   NOTIFIER_DISABLED            (optional; set to "1" to stop the digest worker without a redeploy)

  # -----------------------------------------------------------------------
  # Frontend: Next.js 16 standalone. All NEXT_PUBLIC_* are build-time,
  # baked into the bundle — no way to change them without a rebuild.
  # -----------------------------------------------------------------------
  - name: growfi-frontend
    dockerfile_path: platform/frontend/Dockerfile
    source_dir: platform/frontend
    github:
      repo: rifaisiciliadao/growfi
      branch: main
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 3000
    health_check:
      http_path: /
      initial_delay_seconds: 20
      period_seconds: 30
      timeout_seconds: 5
      failure_threshold: 3
    envs:
      - key: NEXT_PUBLIC_CHAIN_ID
        value: "11155111"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_FACTORY_ADDRESS
        value: "0xa4DEd8Ab35e89bCAF1f7DFeb7aB2c1ED533b3f05"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_USDC_ADDRESS
        value: "0x32C344Dc9713d904442d0E5B0d2b7994E52B0d4E"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_USDT_ADDRESS
        value: "0x7c47aa550061117f8440128c6b829da5bf88de06"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_DAI_ADDRESS
        value: "0x3540ea8a6fa084a31321e790b89a6fbe677ae00e"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_REGISTRY_ADDRESS
        value: "0xAef1Cb97C9a8CC2d06d6C662F6655009DED1E1BE"
        scope: BUILD_TIME
