# DigitalOcean App Platform spec for the GrowFi platform.
#
# Architecture: single public HTTPS endpoint (growfi-test.ondigitalocean.app
# initially, custom domain later) with path-based routing:
#   /           -> Next.js frontend
#   /api/*      -> Fastify backend
# Both are Docker-built from the monorepo; pushes to `main` auto-deploy.
#
# Create/update via:
#   doctl apps create --spec .do/app.yaml          # first time
#   doctl apps update <APP_ID> --spec .do/app.yaml # on spec changes
# Secrets (DO_SPACES_KEY / DO_SPACES_SECRET) are set in the dashboard and
# are NOT in this file; this spec only ships non-secret defaults.

name: growfi-test
region: fra

# Path-based ingress: one domain, two services behind it.
ingress:
  rules:
    - match:
        path:
          prefix: /api
      component:
        name: growfi-backend
        # Backend routes are defined with the `/api/...` prefix (e.g.
        # `app.post("/api/upload", ...)`); without preserving the prefix
        # the ingress strips `/api` and every route 404s.
        preserve_path_prefix: true
    - match:
        path:
          prefix: /
      component:
        name: growfi-frontend

services:
  # -----------------------------------------------------------------------
  # Backend: Fastify — DO Spaces uploads + snapshot + merkle generation.
  # -----------------------------------------------------------------------
  - name: growfi-backend
    dockerfile_path: platform/backend/Dockerfile
    source_dir: platform/backend
    github:
      repo: rifaisiciliadao/growfi
      branch: main
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 4001
    health_check:
      http_path: /health
      initial_delay_seconds: 15
      period_seconds: 30
      timeout_seconds: 5
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
      - key: PORT
        value: "4001"
        scope: RUN_TIME
      - key: HOST
        value: 0.0.0.0
        scope: RUN_TIME
      - key: DO_SPACES_REGION
        value: fra1
        scope: RUN_TIME
      - key: DO_SPACES_BUCKET
        value: growfi-media
        scope: RUN_TIME
      - key: DO_SPACES_ENDPOINT
        value: https://fra1.digitaloceanspaces.com
        scope: RUN_TIME
      - key: DO_SPACES_PUBLIC_BASE
        value: https://growfi-media.fra1.digitaloceanspaces.com
        scope: RUN_TIME
      # --- Invite gate (per-eth JSON on growfi-media, Resend mail) ---
      - key: INVITES_OBJECT_PREFIX
        value: invites
        scope: RUN_TIME
      - key: APP_URL
        value: https://growfi-test-m9s8u.ondigitalocean.app
        scope: RUN_TIME
      - key: ADMIN_NOTIFY_EMAIL
        value: hey@growfi.dev
        scope: RUN_TIME
      - key: RESEND_FROM
        value: GrowFi <hello@notifications.growfi.dev>
        scope: RUN_TIME
      - key: INVITE_RATE_WINDOW_MS
        value: "3600000"
        scope: RUN_TIME
      - key: INVITE_RATE_MAX
        value: "5"
        scope: RUN_TIME
      - key: NOTIFIER_INTERVAL_MS
        value: "600000"
        scope: RUN_TIME
      # --- Social verification (mainnet relay remains disabled for first deploy) ---
      - key: CHAIN_ID
        value: "1"
        scope: RUN_TIME
      - key: PRODUCER_REGISTRY_ADDRESS
        # Temporary legacy address while EAS is disabled. Replace with the V2
        # address emitted by RegisterMainnetSocialEAS before enabling relay.
        value: "0x651fb29e69Bde3ADE988e8E75e9A3012272D2de5"
        scope: RUN_TIME
      - key: SOCIAL_EAS_ENABLED
        value: "false"
        scope: RUN_TIME
      - key: SOCIAL_REGISTRY_RELAY
        value: "true"
        scope: RUN_TIME
      - key: SOCIAL_CHALLENGES_OBJECT_PREFIX
        value: social-challenges
        scope: RUN_TIME
      - key: SOCIAL_EAS_MAX_GAS_PRICE_WEI
        value: "50000000000"
        scope: RUN_TIME
      # Secrets (set via dashboard / `doctl apps update --spec ...`, not committed here):
      #   DO_SPACES_KEY                (SECRET, RUN_TIME)
      #   DO_SPACES_SECRET             (SECRET, RUN_TIME)
      #   ADMIN_API_KEY                (SECRET, RUN_TIME)  — shared with the local admin dashboard
      #   RESEND_API_KEY               (SECRET, RUN_TIME)
      #   NOTIFICATIONS_UNSUB_SECRET   (SECRET, RUN_TIME)  — HMAC key for digest unsubscribe links; rotate to invalidate all live links
      #   SEPOLIA_RPC_URL              (optional override for the snapshot multicall)
      #   SOCIAL_CHALLENGE_SECRET      (SECRET, RUN_TIME)
      #   SOCIAL_VERIFIER_PRIVATE_KEY  (SECRET, RUN_TIME)  — must be granted isSocialVerifier on ProducerRegistry before relay works
      #   SOCIAL_RPC_URL               (RUN_TIME; Sepolia/mainnet RPC used to publish EAS + registry txs)
      #   SOCIAL_EAS_ENABLED           (RUN_TIME; set to "true" only where backend tx relay is intended)
      #   SOCIAL_REGISTRY_RELAY        (RUN_TIME; default true, writes ProducerRegistry.setSocialAttestation after EAS)
      #   SOCIAL_CHALLENGES_OBJECT_PREFIX (RUN_TIME; default "social-challenges", atomic replay reservations)
      #   SOCIAL_EAS_MAX_GAS_PRICE_WEI (RUN_TIME; fail-closed gas price ceiling for sponsored EAS txs)
      #   SUBGRAPH_URL                 (optional; defaults to ugraph latest in code)
      #   NOTIFIER_DISABLED            (optional; set to "1" to stop the digest worker without a redeploy)

  # -----------------------------------------------------------------------
  # Frontend: Next.js 16 standalone. All NEXT_PUBLIC_* are build-time,
  # baked into the bundle — no way to change them without a rebuild.
  # -----------------------------------------------------------------------
  - name: growfi-frontend
    dockerfile_path: platform/frontend/Dockerfile
    source_dir: platform/frontend
    github:
      repo: rifaisiciliadao/growfi
      branch: main
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 3000
    health_check:
      http_path: /
      initial_delay_seconds: 20
      period_seconds: 30
      timeout_seconds: 5
      failure_threshold: 3
    envs:
      - key: NEXT_PUBLIC_CHAIN_ID
        value: "1"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_FACTORY_ADDRESS
        value: "0x81c2ecb09B8062cC9F3A4F8682318456304f4aE2"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_USDC_ADDRESS
        value: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_USDT_ADDRESS
        value: "0xdAC17F958D2ee523a2206206994597C13D831ec7"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_DAI_ADDRESS
        value: "0x6B175474E89094C44Da98b954EedeAC495271d0F"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_REGISTRY_ADDRESS
        value: "0xA3AEb95Ff4555E266aa1366000204a75FaD4142B"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_PRODUCER_REGISTRY_ADDRESS
        # Replace with ProducerRegistry V2 in the post-EAS frontend build.
        value: "0x651fb29e69Bde3ADE988e8E75e9A3012272D2de5"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_REPAYMENT_IMPL
        value: "0x34326058FD53c773Fd7E67a20af17d73ae4d793A"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_ECOMMERCE_IMPL
        value: "0x5214CA79f4eb9298e506e2B3181aF0aD24B9Bd4c"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_DEBT_RESTRUCTURING_IMPL
        value: "0x6411BA1923A71E7dAA9BD738D31fF9F81B80319a"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_PROCEEDS_SPLIT_IMPL
        value: "0xb57073310911a902b082d4A7d0CD7dA26e27775D"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_DIRECT_ISSUE_IMPL
        value: "0x236855EAFb5fbe864E3557f8b621950cBB46d816"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_PROJECT_UPDATES_IMPL
        value: "0x43FD484D3e12071a53181c3727354530230bEFCf"
        scope: BUILD_TIME
      - key: NEXT_PUBLIC_GROW_TOKEN
        value: "0xDcb4af0c05bc86D4F3C3351f30735b56a70ad725"
        scope: BUILD_TIME
